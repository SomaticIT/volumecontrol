# Publishes crates to crates.io and creates GitHub releases + tags.
#
# Because branch protection requires ALL CI workflows to pass before
# anything can merge to main, we know CI is green when this runs.
# No polling or waiting needed.

name: Release (publish to crates.io)

on:
  push:
    branches: ["main"]

concurrency:
  group: release-plz-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Publish crates & create releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
