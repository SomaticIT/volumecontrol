name: Windows CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  windows:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 64-bit x86 — primary Windows target.
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          # 32-bit x86 (i386) — WoW64 binaries run on the x64 runner.
          - target: i686-pc-windows-msvc
            runner: windows-latest
          # ARM64 — runs on a native ARM64 runner.
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Check that the crate compiles without the wasapi feature (stub path).
      - name: Check (no feature)
        run: cargo check -p volumecontrol-windows --target ${{ matrix.target }}

      # Check that the crate compiles with the real WASAPI backend enabled.
      - name: Check (wasapi feature)
        run: cargo check -p volumecontrol-windows --features wasapi --target ${{ matrix.target }}

      # Run the stub-path tests (no real WASAPI calls).
      - name: Test (no feature)
        run: cargo test -p volumecontrol-windows --target ${{ matrix.target }}

      # Build and run the real WASAPI tests on the native runner.
      - name: Test (wasapi feature)
        run: cargo test -p volumecontrol-windows --features wasapi --target ${{ matrix.target }}

      # Lint with Clippy; all warnings are treated as errors.
      - name: Clippy
        run: >
          cargo clippy
          -p volumecontrol-windows
          --all-targets
          --all-features
          --target ${{ matrix.target }}
          -- -D warnings
