name: Windows CI

on:
  push:
    branches: ["main"]
    paths:
      - "volumecontrol-windows/**"
      - "volumecontrol-core/**"
      - "volumecontrol/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/windows.yml"
  pull_request:
    paths:
      - "volumecontrol-windows/**"
      - "volumecontrol-core/**"
      - "volumecontrol/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/windows.yml"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  VAD_VERSION: "25.7.14"
  NEFCON_VERSION: "v1.17.40"

jobs:
  windows:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 64-bit x86 — primary Windows target.
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            virtual_audio: true
          # 32-bit x86 (i386) — WoW64 binaries run on the x64 runner.
          # Virtual audio driver cannot be installed reliably on x86, so
          # WASAPI tests are build-only (same as ARM64).
          - target: i686-pc-windows-msvc
            runner: windows-latest
            virtual_audio: false
          # ARM64 — native ARM64 runner; no virtual audio driver release
          # available for this architecture, so WASAPI tests are build-only.
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            virtual_audio: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ matrix.target }}-

      # Install the Virtual Audio Driver on x64 only — the signed release cannot
      # be reliably installed on x86 (i686) or ARM64.  This gives WASAPI tests a
      # real audio endpoint on the x64 runner.
      # Uses nefcon (downloaded directly) to install the driver silently.
      - name: Cache Virtual Audio Driver + nefcon downloads
        id: cache-vad
        if: matrix.virtual_audio
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}\virtual-audio-driver.zip
            ${{ runner.temp }}\nefcon.zip
          key: windows-vad-${{ env.VAD_VERSION }}-nefcon-${{ env.NEFCON_VERSION }}

      - name: Download Virtual Audio Driver + nefcon (if not cached)
        if: matrix.virtual_audio && steps.cache-vad.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/VirtualDrivers/Virtual-Audio-Driver/releases/download/$env:VAD_VERSION/Virtual.Audio.Driver.Signed.-.$env:VAD_VERSION.zip" `
            -OutFile "$env:RUNNER_TEMP\virtual-audio-driver.zip"
          Invoke-WebRequest `
            -Uri "https://github.com/nefarius/nefcon/releases/download/$env:NEFCON_VERSION/nefcon_$env:NEFCON_VERSION.zip" `
            -OutFile "$env:RUNNER_TEMP\nefcon.zip"

      - name: Install Virtual Audio Driver
        if: matrix.virtual_audio
        shell: powershell
        run: |
          # Enable test-signing so unsigned/self-signed drivers are accepted.
          bcdedit /set testsigning on

          $vadZip = "$env:RUNNER_TEMP\virtual-audio-driver.zip"
          $vadDir = "$env:RUNNER_TEMP\virtual-audio-driver"
          Expand-Archive -Path $vadZip -DestinationPath $vadDir

          # Trust the driver's signing certificate to avoid install prompts.
          $signature = Get-AuthenticodeSignature "$vadDir\Virtual Audio Driver\virtualaudiodriver.cat"
          $store = Get-Item -Path Cert:\LocalMachine\TrustedPublisher
          $store.Open("ReadWrite")
          $store.Add($signature.SignerCertificate)
          $store.Close()

          $nefconZip = "$env:RUNNER_TEMP\nefcon.zip"
          $nefconDir = "$env:RUNNER_TEMP\nefcon"
          Expand-Archive -Path $nefconZip -DestinationPath $nefconDir
          $nefconc = "$nefconDir\x64\nefconc.exe"

          # Create the virtual audio device node.
          & $nefconc --create-device-node `
            --hardware-id root\virtualaudiodriver `
            --class-name MEDIA `
            --class-guid 4d36e96c-e325-11ce-bfc1-08002be10318

          # Install the virtual audio driver.
          & $nefconc --install-driver --inf-path "$vadDir\Virtual Audio Driver\VirtualAudioDriver.inf"

      # ── volumecontrol-windows ────────────────────────────────────────────────

      # Check that the crate compiles without the wasapi feature (stub path).
      - name: Check volumecontrol-windows (no feature)
        run: cargo check -p volumecontrol-windows --target ${{ matrix.target }}

      # Check that the crate compiles with the real WASAPI backend enabled.
      - name: Check volumecontrol-windows (wasapi feature)
        run: cargo check -p volumecontrol-windows --features wasapi --target ${{ matrix.target }}

      # Build the crate without the wasapi feature.
      - name: Build volumecontrol-windows (no feature)
        run: cargo build -p volumecontrol-windows --target ${{ matrix.target }}

      # Build the crate with the real WASAPI backend enabled.
      - name: Build volumecontrol-windows (wasapi feature)
        run: cargo build -p volumecontrol-windows --features wasapi --target ${{ matrix.target }}

      # Run the stub-path tests (no real WASAPI calls).
      - name: Test volumecontrol-windows (no feature)
        run: cargo test -p volumecontrol-windows --target ${{ matrix.target }}

      # Build and run the real WASAPI tests on x64 only (virtual audio device
      # is only installed for that target).
      - name: Test volumecontrol-windows (wasapi feature)
        if: matrix.virtual_audio
        run: cargo test -p volumecontrol-windows --features wasapi --target ${{ matrix.target }}

      # On i686 and ARM64 no virtual audio driver is available — only build the
      # test binary to verify it compiles; skip execution.
      - name: Build tests volumecontrol-windows (wasapi feature, no execute)
        if: "!matrix.virtual_audio"
        run: cargo test -p volumecontrol-windows --features wasapi --target ${{ matrix.target }} --no-run

      # Lint with Clippy; all warnings are treated as errors.
      - name: Clippy volumecontrol-windows
        run: >
          cargo clippy
          -p volumecontrol-windows
          --all-targets
          --all-features
          --target ${{ matrix.target }}
          -- -D warnings

      # ── volumecontrol wrapper ────────────────────────────────────────────────
      # The wrapper has no user-visible features; the platform backend is
      # selected and enabled automatically.

      - name: Check volumecontrol
        run: cargo check -p volumecontrol --target ${{ matrix.target }}

      - name: Build volumecontrol
        run: cargo build -p volumecontrol --target ${{ matrix.target }}

      # Run integration tests on x64 only (virtual audio device installed).
      - name: Test volumecontrol
        if: matrix.virtual_audio
        run: cargo test -p volumecontrol --target ${{ matrix.target }}

      # On i686 and ARM64 only build the test binary; skip execution.
      - name: Build tests volumecontrol (no execute)
        if: "!matrix.virtual_audio"
        run: cargo test -p volumecontrol --target ${{ matrix.target }} --no-run

      - name: Clippy volumecontrol
        run: >
          cargo clippy
          -p volumecontrol
          --all-targets
          --target ${{ matrix.target }}
          -- -D warnings

  # ── Documentation (Windows / WASAPI) ─────────────────────────────────────────
  doc:
    name: cargo doc (Windows)
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      RUSTDOCFLAGS: "-D warnings"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-doc-

      - name: cargo doc
        run: >
          cargo doc
          -p volumecontrol-core
          -p volumecontrol-windows
          -p volumecontrol
          --features volumecontrol-windows/wasapi
          --no-deps
