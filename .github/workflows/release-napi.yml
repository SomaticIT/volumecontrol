# Triggered when release-plz creates a volumecontrol-napi-vX.Y.Z tag.
#
# Builds native .node binaries for every napi target, then publishes
# @touchifyapp/volumecontrol (and its per-platform packages) to npm.

name: Release napi

on:
  push:
    tags:
      - 'volumecontrol-napi-v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  # ── Build .node binaries for every target ────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — both x64 and arm64 build on the same runner
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest

          # Windows — all three ABIs build natively on windows-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: i686-pc-windows-msvc
            runner: windows-latest
          - target: aarch64-pc-windows-msvc
            runner: windows-latest

          # Linux x64 — native build; needs PulseAudio dev libs
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            linux_native: true

          # Linux cross targets — use `cross` which reads Cross.toml
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-latest
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: volumecontrol-napi/package-lock.json

      - name: Install Rust (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install PulseAudio dev libs (Linux native)
        if: ${{ matrix.linux_native }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libpulse-dev libasound2-dev

      - name: Install cross (Linux cross-compilation)
        if: ${{ matrix.use_cross }}
        run: cargo install cross --locked

      - name: npm install
        working-directory: volumecontrol-napi
        run: npm install

      - name: Build (using cross)
        if: ${{ matrix.use_cross }}
        working-directory: volumecontrol-napi
        run: npx napi build --platform --release --target ${{ matrix.target }} --use-cross

      - name: Build
        if: ${{ !matrix.use_cross }}
        working-directory: volumecontrol-napi
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: volumecontrol-napi/*.node
          if-no-files-found: error

  # ── Publish to npm ────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: volumecontrol-napi/package-lock.json

      - name: npm install
        working-directory: volumecontrol-napi
        run: npm install

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: volumecontrol-napi/artifacts

      - name: Move .node files into package directory
        working-directory: volumecontrol-napi
        run: npx napi artifacts --input ./artifacts --output .

      - name: Generate per-platform npm packages
        working-directory: volumecontrol-napi
        run: npx napi prepublish -t npm

      - name: Publish platform packages
        working-directory: volumecontrol-napi
        run: |
          set -e
          for dir in npm/@*/*/; do
            npm publish "$dir" --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        working-directory: volumecontrol-napi
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
