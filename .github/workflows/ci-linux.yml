# CI workflow for the volumecontrol-linux (PulseAudio) crate.
#
# Build matrix
# ┌───────────────────────────────────┬──────────────┬──────────────────────┐
# │ target                            │ libc         │ pulseaudio           │
# ├───────────────────────────────────┼──────────────┼──────────────────────┤
# │ x86_64-unknown-linux-gnu  (native)│ glibc        │ build + test         │
# │ aarch64-unknown-linux-gnu  (cross)│ glibc        │ build + test (cross) │
# │ armv7-unknown-linux-gnueabihf     │ glibc        │ build + test (cross) │
# │ x86_64-unknown-linux-musl  (cross)│ musl         │ check only (stub)    │
# │ aarch64-unknown-linux-musl        │ musl         │ check only (stub)    │
# │ armv7-unknown-linux-musleabihf    │ musl         │ check only (stub)    │
# └───────────────────────────────────┴──────────────┴──────────────────────┘
#
# Cross-compilation uses `cross` (https://github.com/cross-rs/cross).
# GNU targets install libpulse-dev and libasound2-dev for the target
# architecture via the [workspace.metadata.cross.target.*] pre-build hooks
# in Cargo.toml.
# musl targets cannot link against glibc-backed libpulse.so, so they verify
# only that the no-feature stub compiles correctly.

name: CI – Linux (PulseAudio)

on:
  push:
    paths:
      - "volumecontrol-linux/**"
      - "volumecontrol-core/**"
      - ".github/workflows/ci-linux.yml"
  pull_request:
    paths:
      - "volumecontrol-linux/**"
      - "volumecontrol-core/**"
      - ".github/workflows/ci-linux.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Native x86_64 build + test (with the `pulseaudio` feature) ─────────────
  native:
    name: Build & Test (x86_64-unknown-linux-gnu, pulseaudio feature)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-native-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-native-

      # libpulse-dev depends on libasound2-dev on Ubuntu.
      - name: Install PulseAudio development libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libpulse-dev libasound2-dev

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (pulseaudio feature)
        run: >
          cargo clippy
          -p volumecontrol-linux
          --features pulseaudio
          --all-targets
          -- -D warnings

      - name: cargo build (pulseaudio feature)
        run: cargo build -p volumecontrol-linux --features pulseaudio

      - name: cargo test (pulseaudio feature)
        run: cargo test -p volumecontrol-linux --features pulseaudio

      - name: cargo test (no features – stub path)
        run: cargo test -p volumecontrol-linux

  # ── Cross-compilation with `cross` (build + test on GNU; check on musl) ──────
  cross:
    name: Cross (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # musl targets: PulseAudio's shared library is glibc-linked and cannot
          # be linked into musl binaries.  We verify the stub path compiles.
          - target: x86_64-unknown-linux-musl
            can_run_tests: false
          - target: aarch64-unknown-linux-musl
            can_run_tests: false
          - target: armv7-unknown-linux-musleabihf
            can_run_tests: false
          # GNU targets: cross installs libpulse-dev via the pre-build steps in
          # Cargo.toml, enabling a full build and test run under QEMU.
          - target: aarch64-unknown-linux-gnu
            can_run_tests: true
          - target: armv7-unknown-linux-gnueabihf
            can_run_tests: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-cross-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-cross-${{ matrix.target }}-

      - name: Install cross
        run: cargo install cross --locked

      # ── GNU targets: full build + test with the `pulseaudio` feature ──
      - name: cross build (pulseaudio feature)
        if: matrix.can_run_tests
        run: >
          cross build
          -p volumecontrol-linux
          --target ${{ matrix.target }}
          --features pulseaudio

      - name: cross test (pulseaudio feature)
        if: matrix.can_run_tests
        run: >
          cross test
          -p volumecontrol-linux
          --target ${{ matrix.target }}
          --features pulseaudio

      # ── musl targets: type-check only (no pulseaudio feature) ──
      - name: cross check – volumecontrol-linux (no features)
        if: "!matrix.can_run_tests"
        run: >
          cross check
          -p volumecontrol-linux
          --target ${{ matrix.target }}

      - name: cross check – whole workspace (no features)
        if: "!matrix.can_run_tests"
        run: >
          cross check
          --workspace
          --target ${{ matrix.target }}
